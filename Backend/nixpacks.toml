providers = ["php"]

[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.dom",
  "php82Extensions.fileinfo",
  "php82Extensions.mongodb"
]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "php artisan optimize:clear",
    "php artisan config:cache",
    "php artisan route:cache"
]

[start]
cmd = "php artisan config:clear && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT"

